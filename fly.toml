# fly.toml app configuration file generated for vedel-site on 2026-02-19T19:52:07+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vedel-site'
primary_region = 'fra'

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
